name: Destroy

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Empty ECR repository before destroy
        run: |
          REPO_NAME="${{ secrets.PROJECT_NAME }}-app"
          echo "Checking for images in ECR repository: ${REPO_NAME}"

          # List all image digests in the repository
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name "${REPO_NAME}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'imageIds[*]' \
            --output json 2>/dev/null || echo '[]')

          if [ "${IMAGE_IDS}" = "[]" ] || [ -z "${IMAGE_IDS}" ]; then
            echo "No images found in ${REPO_NAME}, nothing to delete."
          else
            echo "Deleting all images from ${REPO_NAME}..."
            aws ecr batch-delete-image \
              --repository-name "${REPO_NAME}" \
              --region "${{ secrets.AWS_REGION }}" \
              --image-ids "${IMAGE_IDS}"
            echo "All images deleted from ${REPO_NAME}."
          fi

      - name: Terraform destroy
        working-directory: terraform
        run: |-
          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="db_password=placeholder" \
            -var="image_uri=placeholder"
