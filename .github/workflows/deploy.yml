name: Deploy

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # test - run the app's own test suite
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Lint (advisory only)
        run: npm run lint || true
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # security - Trivy filesystem scan
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ---------------------------------------------------------------------------
  # build - build Docker image, scan with Trivy, push to ECR
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      # Only the tag (short SHA) is passed as a job output — it contains no
      # masked values (no account ID, no secret) so GitHub Actions will not
      # suppress it.  The provision job reconstructs the full URI itself.
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Create the ECR repository via Terraform BEFORE docker push
      # (the repo is Terraform-managed; the later full apply is a no-op for it)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init (target ECR repo creation)
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Create ECR repository (targeted apply)
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="db_password=placeholder" \
            -var="image_uri=placeholder"

      # Build image
      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        id: docker_build
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ secrets.PROJECT_NAME }}-app"
          TAG="${{ steps.tag.outputs.tag }}"
          IMAGE="${REGISTRY}/${REPO}:${TAG}"
          docker build -t "${IMAGE}" .
          if [ $? -ne 0 ]; then
            echo "Docker build FAILED - aborting."
            exit 1
          fi
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: "image"
          image-ref: ${{ steps.docker_build.outputs.image }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

      - name: Push Docker image to ECR
        id: push
        run: |
          docker push "${{ steps.docker_build.outputs.image }}"

  # ---------------------------------------------------------------------------
  # provision - Terraform apply (full infra + service update)
  # ---------------------------------------------------------------------------
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Log in to ECR to obtain the registry hostname, then reconstruct the
      # full image URI from its parts.  None of those parts (tag = short SHA,
      # repo name = project + "-app", registry from ECR login) is a masked
      # secret, so the value propagates cleanly across the job boundary.
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Reconstruct image URI
        id: image
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ secrets.PROJECT_NAME }}-app"
          TAG="${{ needs.build.outputs.image_tag }}"
          IMAGE_URI="${REGISTRY}/${REPO}:${TAG}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="image_uri=${{ steps.image.outputs.uri }}"

  # ---------------------------------------------------------------------------
  # verify - smoke-test the deployed endpoint
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB endpoint
        id: get_endpoint
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for service to stabilise
        run: sleep 90

      - name: Smoke test - health endpoint
        run: |-
          APP_URL="${{ steps.get_endpoint.outputs.app_url }}"
          echo "Probing: ${APP_URL}/health"
          MAX_RETRIES=10
          RETRY_DELAY=15
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health" || true)
            echo "Attempt ${i}/${MAX_RETRIES} - HTTP ${STATUS}"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "Health check passed (HTTP ${STATUS})"
              exit 0
            fi
            echo "Not healthy yet, waiting ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "Health check FAILED after ${MAX_RETRIES} attempts"
          exit 1
